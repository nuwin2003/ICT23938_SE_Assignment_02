# ================================================================
# SmartRetailX - Inventory Service Configuration
# ================================================================

# Application
spring.application.name=smartretailx-inventory-service
server.port=8081

# ----------------------------------------------------------------
# H2 In-Memory Database (Development / Demo)
# Replace with PostgreSQL configuration in production
# ----------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------------------------------
# JPA / Hibernate
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----------------------------------------------------------------
# Production Database (PostgreSQL) - Uncomment for production
# ----------------------------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/smartretailx_inventory
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# ----------------------------------------------------------------
# Logging
# ----------------------------------------------------------------
logging.level.com.smartretailx=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ----------------------------------------------------------------
# Inventory Business Configuration
# ----------------------------------------------------------------
# Default low stock threshold (can be overridden per product)
inventory.default.low-stock-threshold=10
